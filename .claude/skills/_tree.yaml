# Skill Tree Index
# Registers all skills with parent/children relationships
# Mirrors memory tree K=4 branching constraint
# Updated: 2026-03-16

config:
  K: 4                          # max sub-skills per parent
  max_skills: 15                # ceiling to prevent sprawl
  developmental_gate: EXPLOIT   # minimum capability level before forging allowed
  control_skills: [start, stop, reset, escapePersona, enterPersona, verify-learning]
  # Forged skills tracked in mind/forged-skills.yaml (not here).
  # This file is STATIC framework — never modified during RUNNING state.

# --- Control Skills (USER-ONLY — Claude must NEVER invoke these) ---

start:
  file: .claude/skills/start/SKILL.md
  parent: null
  children: []
  type: control
  user_invocable: true
  model_invocable: false
  status: active

