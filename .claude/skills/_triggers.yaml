# Skill Trigger Tree — condition->skill routing
# Maps when parent skills should invoke child skills
# Updated: 2026-03-06

# Control skills (start, stop, open-questions) are user-only — never triggered by agent.
# agent-completion-report is user-invocable AND agent-callable. Writes report files to <agent>/.
# Internal skills are agent-only — invoked during RUNNING state.
# State machine: agent-state file is the authoritative signal.

# --- Orchestrator triggers ---
# /aspirations is the heartbeat — it routes to these skills based on goal type

aspirations:
  triggers:
    - condition: "active hypotheses need resolution checking"
      calls: review-hypotheses
      priority: 1
      notes: "Invoked when active/ hypothesis records may have resolved"

    - condition: "knowledge gap identified during evaluation or exploration"
      calls: research-topic
      priority: 2
      notes: "Invoked when category capability_level is EXPLORE or knowledge is missing"

    - condition: "compound goal needs HTN decomposition"
      calls: decompose
      priority: 2
      notes: "Invoked when a goal has no primitives or desiredEndState is complex"

    - condition: "session start or status check requested"
      calls: boot
      priority: 3
      notes: "Optional at session start for readiness dashboard"

    - condition: "aspiration generation needed (no goals, aspiration complete, evolve, user request)"
      calls: create-aspiration
      priority: 2
      notes: "Self-driven aspiration creation — reads <agent>/self.md for alignment"

# --- Review triggers ---
# /review-hypotheses may invoke sub-skills for result checking

review-hypotheses:
  triggers:
    - condition: "hypothesis resolved — outcome available"
      calls: reflect
      priority: 1
      notes: "Always invoked after hypothesis resolution for ABC chain and learning extraction"

# --- Learning triggers ---
# /reflect may invoke replay for deeper consolidation

reflect:
  triggers:
    - condition: "full-cycle reflection (3+ resolutions in batch)"
      calls: replay
      priority: 2
      notes: "Hippocampal replay for compressed review and reconsolidation"

    - condition: "violation of expectation detected"
      calls: replay
      priority: 1
      notes: "Sharp-wave replay triggered by surprising outcomes"

    - condition: "belief_update — update belief confidence after hypothesis resolution"
      calls: reflect
      priority: 1
      writes: ["world/knowledge/beliefs.yaml", "world/knowledge/transitions.yaml"]
      step: "Step 7.6"
      notes: "Update belief confidence after hypothesis resolution"

    - condition: "reasoning_extraction — extract reasoning strategies from resolved hypotheses"
      calls: reflect
      priority: 2
      writes: ["world/reasoning-bank.jsonl"]
      step: "Step 2.5"
      notes: "Extract reasoning strategies from resolved hypotheses"

    - condition: "step_attribution — label evaluation steps after reflection"
      calls: reflect
      priority: 2
      writes: ["meta/step-attribution.yaml"]
      step: "Step 7.6c"
      notes: "Label evaluation steps after reflection"

# --- Boot triggers ---
# /boot calls /prime for context loading

boot:
  triggers:
    - condition: "session start — load domain knowledge into context"
      calls: prime
      priority: 1
      notes: "Called at Step 2.7 (full boot) or Step 8.5 (continuation). Dual-use: also user-invocable in IDLE."

# --- Evolution triggers ---
# /aspirations checks performance-based triggers after each goal

aspirations_evolution:
  triggers:
    - condition: "performance_evolution — check performance-based evolution triggers"
      calls: aspirations
      priority: 1
      reads: ["core/config/evolution-triggers.yaml"]
      writes: ["meta/strategy-archive.yaml"]
      step: "Phase 9"
      notes: "Check performance-based evolution triggers after each goal completion"

# --- Routing metadata ---
# Used by /forge-skill to know which parent to attach new skills under

routing_notes:
  - "Priority 1 = always invoke when condition met; Priority 2 = invoke if time/budget allows; Priority 3 = optional"
  - "Conditions are evaluated by the parent skill at runtime using pattern matching on context"
  - "This file is STATIC framework — forged skill triggers tracked in <agent>/forged-skills.yaml"
