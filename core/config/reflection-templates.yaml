# Domain-Specialized Reflection Templates — Framework Definition
# Default template is immutable. Domain-specific templates are agent state.
# Agent state lives in meta/reflection-templates.yaml
# Boot reads initial_state to seed state file on first run.

# --- FRAMEWORK ---

default_template:
  questions:
    - "What was the primary information edge (or lack thereof)?"
    - "Was confidence calibrated correctly vs the outcome?"
    - "What context was missing that would have changed the hypothesis?"
    - "Were there biases that should have been accounted for?"
  focus: "General calibration and edge assessment"

# Creative Lens — universal supplement that fires for ALL reflections alongside
# the domain template. Prompts divergent/lateral thinking before convergent encoding.
creative_lens:
  questions:
    - "What is the OPPOSITE of this conclusion, and under what conditions would the opposite be true?"
    - "What UNRELATED domain has a pattern that resembles what just happened here? What does that analogy suggest?"
    - "If this outcome is correct for the WRONG reasons, what is the real explanation?"
    - "What would someone who DISAGREES with this conclusion say? What evidence would they cite?"
    - "What HIDDEN VARIABLE might explain this outcome that we haven't considered?"
  focus: "Lateral thinking, contrarian reframing, cross-domain analogy, alternative explanation generation"

# Routine Lens — operational self-audit that fires for ROUTINE outcomes only (Step 5r).
# Unlike creative_lens (which reframes outcomes), this probes the agent's own process health.
# One question per execution, rotating via hash(goal.id + achievedCount).
routine_lens:
  questions:
    - "What am I NOT checking here that could silently degrade or break without me noticing?"
    - "What data passes through this execution that I'm ignoring? What data should I be collecting but am not?"
    - "What would be the first signal that this routine outcome is about to change, and am I watching for it?"
    - "Have my pre-execution assumptions or post-execution checks gone stale — am I verifying things that no longer matter, or skipping things that now do?"
    - "Is there friction in how I execute this goal — unnecessary steps, stale assumptions, or tools I'm fighting against?"
    - "Is this goal earning its execution slot? What would make it more valuable without increasing its cost?"
    - "What is one change that would make this routine produce learning, not just confirmation?"
    - "Am I doing this because it produces learning, or just because it's on the list? What would I learn if I did it differently?"
  focus: "Operational self-audit, blind spot detection, process health, execution quality, value justification"

# Domain-specific templates — replace default for their category.
# Each includes 2 standard calibration questions + 2 domain-specific creative questions.
domain_templates:
  code:
    questions:
      - "What was the primary information edge (or lack thereof)?"
      - "Was confidence calibrated correctly vs the outcome?"
      - "What architectural assumption does this outcome validate or invalidate?"
      - "What would break first if this code had 10x the load?"
    focus: "Code quality calibration and architectural edge assessment"

  infrastructure:
    questions:
      - "What was the primary information edge (or lack thereof)?"
      - "Was confidence calibrated correctly vs the outcome?"
      - "What failure mode does this outcome make more or less likely?"
      - "What monitoring gap would prevent us from detecting this issue in production?"
    focus: "Infrastructure calibration with operational reliability assessment"

  research:
    questions:
      - "What was the primary information edge (or lack thereof)?"
      - "Was confidence calibrated correctly vs the outcome?"
      - "What did we learn that contradicts something we previously believed?"
      - "What question does this answer raise that we haven't asked yet?"
    focus: "Research calibration with knowledge frontier extension"

