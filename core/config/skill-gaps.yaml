# Skill Gap Registry — Framework Definition
# Immutable forge configuration. Agent state lives in meta/skill-gaps.yaml
# Boot reads initial_state to seed state file on first run.

# --- FRAMEWORK ---

config:
  forge_threshold: 2
  max_gaps: 20
  encounter_log_limit: 5

gap_types:
  utility:
    description: "Well-defined procedures (API calls, data formatting, retrieval workflows)"
    forge_gate: CALIBRATE  # 0.30+ confidence required
  analytical:
    description: "Skills requiring domain understanding (pattern recognition, evaluation)"
    forge_gate: EXPLOIT    # 0.60+ confidence required (default)

experience_mining:
  min_cluster_size: 3           # Min similar executions to register a gap
  scan_window_days: 30          # Only scan recent experiences
  max_gaps_per_scan: 3          # Prevent gap explosion from single mining pass

quality_thresholds:
  retirement_floor: 0.30        # Overall skill quality below → retirement candidate
  review_floor: 0.50            # Overall skill quality below → review needed
  dimension_floor: 0.20         # Any single dimension below → alert
  min_evaluations: 5            # Min evaluations before quality-based actions

modifiable:
  forge_threshold: {min: 1, max: 5, default: 2}
  max_gaps: {min: 10, max: 40, default: 20}
  encounter_log_limit: {min: 3, max: 10, default: 5}
  max_skills: {min: 10, max: 25, default: 15}

# --- INITIAL STATE ---

initial_state:
  last_updated: null
  gaps: []
