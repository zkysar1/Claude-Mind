# Aspiration Engine — Framework Definition
# Immutable configuration. Agent state lives in world/aspirations.jsonl
# init-world.sh copies core/config/world-aspirations-initial.jsonl to world/ on first run.
# init-agent.sh copies core/config/agent-aspirations-initial.jsonl to <agent>/ on first run.

# --- FRAMEWORK ---

max_active: 20

# Team-based goal delegation
max_concurrent_goals: 3   # Max concurrent goals per iteration (primary + parallel)

# --- GOAL TEMPLATES ---
# Reference templates for goal creation. Match the goal's purpose to a template.
# When creating a goal, start from _common_fields, then layer on the style-specific fields.
# These are patterns, not live data — adapt IDs, titles, and details to the situation.

goal_templates:
  # Fields required on EVERY goal regardless of style
  _common_fields:
    id: "g-{asp}-{seq}"             # aspiration number + sequence (e.g., g-003-02)
    title: "Short descriptive title"
    description: "What this goal does, why it matters, and key context"
    status: pending
    participants: [agent]            # [agent] (any), [user], [alpha], [bravo], or combinations
    blocked_by: []                   # IDs of prerequisite goals
    verification:                    # unified field (replaces desiredEndState + completion_check)
      outcomes: ["Measurable outcome that agent can verify"]  # human-readable
      checks: []                     # machine-verifiable conditions
      preconditions: []              # what must be true before execution
    achievedCount: 0
    priority: MEDIUM                 # HIGH, MEDIUM, LOW
    category: null                    # Tree category for retrieval — set via category-suggest.sh
    deferred_until: null              # ISO 8601 timestamp — goal skipped in COLLECT until this time
    defer_reason: null                # Why deferred — non-null value filters goal from selection

  # Build knowledge — deep-dives, audits, topic exploration
  research:
    skill: /research-topic
    verification:
      outcomes: ["Knowledge node registered for {topic} with research findings"]
      checks:
        - type: file_check
          target: "world/knowledge/tree/_tree.yaml"
          condition: "Node registered for {topic} with research findings"

  # Code changes — bug fixes, features, refactoring, security hardening
  development:
    skill: null                      # agent uses tools directly (Read, Edit, Bash)
    verification:
      outcomes: ["Specific code artifact changed or created"]
      checks: []                     # agent verifies inline during Phase 5
      verification_hint: "Consider: file_check on changed file, command_check on build/test"

  # Testable predictions — created by sq-009 spark or /decompose companion
  hypothesis:
    skill: "/review-hypotheses --hypothesis {hypothesis_id}"
    hypothesis_id: "{YYYY-MM-DD}_{slug}"  # links to pipeline backing file
    horizon: short                   # session | short | long (micro stays in working memory)
    resolves_no_earlier_than: null    # session: null, short: +12h, long: +24h
    resolves_by: null                # session: session_end, short: +7d, long: +90d
    # Pipeline record must exist in world/pipeline.jsonl (accessed via pipeline-read.sh)
    # Phase 5 handles CONFIRMED/CORRECTED/PENDING/EXPIRED — not completion_check

  # Batch hypothesis operations — resolve outcomes, learn from results
  review:
    skill: "/review-hypotheses --resolve"  # or --learn, --full-cycle, --accuracy-report
    verification:
      outcomes: ["Pipeline records processed and accuracy updated"]
      checks: []
      verification_hint: "Consider: command_check on pipeline-read.sh to verify records moved"

  # Recurring housekeeping — goals that re-fire on a schedule.
  # NOTE: Any goal template can be combined with these recurring fields.
  # Add recurring: true + interval_hours to any goal to make it repeat.
  # The monitoring template is an example of a naturally recurring pattern.
  recurring:
    recurring: true
    interval_hours: 24
    lastAchievedAt: null
    achievedCount: 0
    currentStreak: 0
    longestStreak: 0
    verification:
      outcomes: ["Task completed successfully"]
      checks: []
      preconditions: []
      verification_hint: "Consider: command_check or file_check appropriate to the recurring task"

  # Requires user decision or infrastructure access the agent lacks
  user_action:
    participants: [user]
    skill: null
    # Agent skips in COLLECT (scores +0 in agent_executable)
    # Agent logs reminder and continues autonomously

  # --- Verification & Testing ---

  test_automated:
    skill: null
    verification:
      outcomes: ["Test suite passes with N assertions covering {scope}"]
      checks:
        - type: command_check
          command: "{test_command}"
          condition: "exit code 0"

  test_manual:
    skill: null
    verification:
      outcomes: ["Observed behavior matches expected: {description}"]
      checks: []
      verification_hint: "Consider: can this be converted to a command_check or automated test?"

  test_regression:
    skill: null
    verification:
      outcomes: ["Regression test added covering {bug/change}"]
      checks:
        - type: file_check
          target: "{test_file_path}"
          condition: "exists and contains assertion for {scenario}"

  test_integration:
    skill: null
    verification:
      outcomes:
        - "Integration path traced: {trigger} -> {handler} -> {side_effect}"
        - "Silent behavioral gaps identified or confirmed absent"
      checks: []
      verification_hint: "STRONGLY consider: command_check on integration test, file_check on trace output"
      preconditions:
        - "Target module or integration path identified"

  # --- Analysis & Knowledge ---

  analysis:
    skill: null
    verification:
      outcomes: ["Analysis complete with findings documented in {location}"]
      checks: []
      verification_hint: "Consider: file_check on output document or knowledge node"

  audit:
    skill: null
    verification:
      outcomes: ["Audit complete: {N} items reviewed, {M} issues found"]
      checks: []
      verification_hint: "Consider: file_check on audit report, command_check verifying item count"

  documentation:
    skill: null
    verification:
      outcomes: ["{document} created/updated at {path}"]
      checks:
        - type: file_check
          target: "{path}"
          condition: "exists"

  knowledge_encoding:
    skill: null
    verification:
      outcomes: ["Knowledge node {key} updated with {topic} findings"]
      checks:
        - type: file_check
          target: "world/knowledge/tree/_tree.yaml"
          condition: "Node {key} exists with updated content"

  infrastructure:
    skill: null
    verification:
      outcomes: ["{system} deployed/configured and operational"]
      checks: []
      verification_hint: "Consider: command_check on health endpoint or infra-health.sh check"

  # --- Pain / Reactive ---

  diagnosis:
    skill: null
    # Deliverable is understanding, not code. Use when something is broken
    # and the root cause is unknown. Distinct from development (which fixes).
    verification:
      outcomes: ["Root cause of {problem} identified and documented"]
      checks: []
      verification_hint: "Consider: file_check on knowledge node documenting root cause"

  blocker_resolution:
    skill: null
    # Actively clear a blocker instead of waiting for expiry or user.
    # Links to working memory known_blockers entries.
    verification:
      outcomes: ["{blocker} resolved — {skill/resource} now accessible"]
      checks: []
      verification_hint: "Consider: command_check verifying the previously-blocked action succeeds"

  cleanup:
    skill: null
    # Remove stale data, orphaned references, dead code, contradicted knowledge.
    # Distinct from audit (which finds issues) — cleanup fixes them.
    verification:
      outcomes: ["{target} cleaned — {N} items removed/updated, no orphaned references"]
      checks: []
      verification_hint: "Consider: command_check counting remaining orphaned items (should be 0)"

  # --- Recurring / Trigger-Aware ---

  monitoring:
    skill: null
    # Naturally recurring observation. Combine with recurring fields.
    # Use for health checks, log watching, metric tracking.
    recurring: true
    interval_hours: 4
    lastAchievedAt: null
    achievedCount: 0
    currentStreak: 0
    longestStreak: 0
    verification:
      outcomes: ["Health check passed for {system}, anomalies documented if found"]
      checks: []
      verification_hint: "Consider: command_check on health endpoint, file_check on anomaly log"

  # --- Learning Through Building ---

  spike:
    skill: null
    # Build throwaway prototype to learn. Artifacts are disposable —
    # the LEARNING (encoded in knowledge tree) is the deliverable.
    # Do not commit spike code to production repos.
    verification:
      outcomes: ["Spike findings documented — {question} answered via {approach}"]
      checks:
        - type: file_check
          target: "world/knowledge/tree/_tree.yaml"
          condition: "Node updated with spike findings"

# Proactive starvation prevention — create work BEFORE the pipeline empties.
# Phase 0.5.1 counts executable goals and triggers /create-aspiration when below this.
pipeline_low_water_mark: 3      # create new work when executable goals drop below this

# Hypothesis pipeline starvation prevention — ensure the prediction pipeline stays active.
# Phase 0.5.2 counts discovered+evaluating+active pipeline records and triggers investigation when below this.
hypothesis_pipeline_low_water_mark: 2   # create prediction review goal when active hypotheses drop below this

# Accuracy health gate — create investigation work when prediction accuracy drops critically.
# Phase 0.5.3 reads pipeline accuracy and triggers investigation when below this threshold.
accuracy_critical_threshold: 0.40       # trigger investigation when accuracy drops below 40%
accuracy_min_sample: 5                  # require at least 5 resolved hypotheses before gate activates

planning:
  check_interval_goals: 3       # run alignment check every N completed goals
  novelty_drought_hours: 48     # hours since last first-time goal completion
  maintenance_threshold: 0.70   # fraction of recurring goals that suggests planning

# --- ASPIRATION SCOPES ---
# Aspirations are classified by scope to control research depth, goal count,
# and archival maturity. Default is "project" — multi-session arcs with research.
# Scope cascades into: research requirements, goal count ranges, archival gates.
# Cognitive primitives (Unblock/Investigate/Idea goals) are scope-exempt.

aspiration_scopes:
  sprint:
    description: "Tactical — single fix, cleanup, reactive response (1-2 sessions)"
    goal_range: [2, 5]
    research_required: false
    archival_min_sessions: 1
    goal_addition_research: false
  project:
    description: "Multi-session arc — research + build + test lifecycle (3-10 sessions)"
    goal_range: [5, 15]
    research_required: true
    archival_min_sessions: 2
    goal_addition_research: true
  initiative:
    description: "Strategic arc — phased work, many sessions (10+)"
    goal_range: [10, 30]
    research_required: true
    archival_min_sessions: 4
    goal_addition_research: true
    phased_generation: true    # Generate Phase 1 goals now; later phases in description

default_scope: project

# --- EPISODE CHAINING (MR-Search: Meta-RL with Self-Reflection) ---
# When a goal fails or produces a surprising outcome, chain multiple attempts
# with structured reflection between each. Context accumulates:
#   goal → episode₀ → reflection₀ → episode₁ → reflection₁ → ...
# Inspired by: MR-Search (arXiv 2603.11327) sequential episode chaining.
# The agent learns through failure within the same problem context rather than
# deferring retry to a future loop iteration with no structured memory.

episode_chaining:
  max_episodes_per_goal: 3           # Max retry attempts with reflection
  reflection_budget_per_episode: "mini"  # mini | standard — controls reflection depth between episodes
  chain_on_outcomes:                 # Which outcomes trigger chaining
    - "failed"                       # Goal execution failed (NOT infrastructure — Phase 4.0 handles those)
  carry_forward_context: true        # Include prior episode context in next attempt
  context_zone_override:             # Limit chaining based on context budget
    tight: 0                         # Disabled — no retries in tight context
    normal: 1                        # One retry
    fresh: 2                         # Two retries

# --- EXPLORATION MODE (MR-Search: Exploration/Exploitation Masking) ---
# Designates certain goal executions as "exploration" where failure does NOT
# negatively impact accuracy stats, streaks, or evolution triggers.
# Information gathered IS retained in experience archive and knowledge tree.
# Inspired by: MR-Search exploration episode masking — zero reward during
# backpropagation, but full context retention in forward pass.

# --- PLATEAU DETECTION (AVO-inspired: arXiv 2603.24517) ---
# Detects when aspirations keep completing goals but learning yield is stagnating.
# Inspired by NVIDIA AVO's self-supervision mechanism that detects exhausted
# exploration directions and unproductive cycles, then redirects strategically.

plateau_detection:
  velocity_window: 5              # Number of recent completed goals to analyze
  plateau_threshold: 0.2          # Learning velocity below this = plateau
  diminishing_returns_window: 5   # Goals over which to check monotonic decline
  # Learning is measured by aspiration-trajectory.py as: reasoning bank entries,
  # guardrails, pattern signatures, and tree node updates attributed to each goal.

# --- CYCLE DETECTION (AVO-inspired: arXiv 2603.24517) ---
# Detects when the agent cycles through similar failing approaches across
# different goals within the same aspiration without stepping back to
# question root assumptions. Inspired by AVO's unproductive edit cycle detection.

cycle_detection:
  lookback_window: 3              # Number of recent goals to check for cycles
  checks:                         # What the precheck skill looks for
    - repeated_failure             # Almost all recent goals skipped/blocked
    - zero_learning_velocity       # Same-category goals producing no learning artifacts

exploration_mode:
  auto_designate_below_capability: 0.30  # Categories below this capability_level
  max_exploration_fraction: 0.25          # Max fraction of goals in exploration mode per session
  shield_from:                            # What exploration goals are shielded from
    - accuracy_stats                      # Don't count toward accuracy tracking
    - streak_reset                        # Don't break streaks on failure
    - evolution_triggers                  # Don't fire accuracy_drop or consecutive_losses
  retain_in:                              # What exploration goals still contribute to
    - experience_archive                  # Full-fidelity trace preserved
    - tree_encoding                       # Knowledge encoded regardless of outcome
    - pattern_signatures                  # Patterns still matched and recorded

# --- STEPPING-STONE RETRIEVAL (OMNI-EPIC-inspired: arXiv 2405.15568) ---
# When generating new aspirations, retrieve K most recently completed aspirations
# from the archive as creative stepping stones. Nearby successes are the best
# substrate for novel task generation. Partial archive visibility (showing only K,
# not everything) supports creativity — OMNI-EPIC's key design choice.

stepping_stones:
  default_limit: 5              # K — number of archived aspirations to retrieve
  source: archive               # Where to pull stepping stones from

# --- OPEN-ENDED PROGRESS (OMNI-EPIC-inspired: ANNECS metric) ---
# Tracks accumulated number of Novel, Interesting aspirations Created and Solved.
# "Novel" = passed interestingness filter. "Solved" = completed with learning artifacts.
# Used by evolution to detect stagnation in aspiration QUALITY, not just velocity.

open_ended_progress:
  metric: annecs                # Accumulated Novel Aspirations Created and Solved
  novelty_window: 10            # Compare against last N archived aspirations for novelty
  track_in: aspirations-meta.json

modifiable:
  max_active: {min: 3, max: 25, default: 20}
  # Agent delegation
  max_concurrent_goals: {min: 1, max: 3, default: 3}
  # Pipeline starvation prevention
  pipeline_low_water_mark: {min: 1, max: 10, default: 3}
  # Hypothesis pipeline starvation prevention
  hypothesis_pipeline_low_water_mark: {min: 0, max: 5, default: 2}
  # Accuracy health gate
  accuracy_critical_threshold: {min: 0.20, max: 0.60, default: 0.40}
  accuracy_min_sample: {min: 3, max: 15, default: 5}
  # Planning thresholds (guidelines for LLM, not hard gates)
  check_interval_goals: {min: 1, max: 10, default: 3}
  novelty_drought_hours: {min: 12, max: 168, default: 48}
  maintenance_threshold: {min: 0.50, max: 0.95, default: 0.70}
  default_scope: {values: [sprint, project, initiative], default: project}
  # Episode chaining bounds
  max_episodes_per_goal: {min: 1, max: 5, default: 3}
  # Exploration mode bounds
  auto_designate_below_capability: {min: 0.10, max: 0.50, default: 0.30}
  max_exploration_fraction: {min: 0.10, max: 0.50, default: 0.25}
  # Plateau detection bounds (AVO-inspired)
  plateau_detection.velocity_window: {min: 3, max: 10, default: 5}
  plateau_detection.plateau_threshold: {min: 0.05, max: 0.50, default: 0.2}
  plateau_detection.diminishing_returns_window: {min: 3, max: 10, default: 5}
  # Cycle detection bounds (AVO-inspired)
  cycle_detection.lookback_window: {min: 2, max: 5, default: 3}
