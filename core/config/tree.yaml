      depth: 0
      parent: null
      children: [execution, intelligence, performance, system]
      child_count: 4
      article_count: 0
      growth_state: stable
      summary: "Top-level routing index. Four L1 domains: execution (strategies), intelligence (knowledge), performance (tracking), system (meta). Empty — agent has not learned anything yet."
    execution:
      file: mind/knowledge/tree/execution.md
      depth: 1
      parent: root
      children: []
      child_count: 0
      domain_confidence: null
      article_count: 0
      growth_state: stable
      summary: "What to DO — strategies and methods for taking action. Empty — will grow as the agent learns a domain."
    intelligence:
      file: mind/knowledge/tree/intelligence.md
      depth: 1
      parent: root
      children: []
      child_count: 0
      domain_confidence: null
      article_count: 0
      growth_state: stable
      summary: "What we KNOW — domain knowledge and understanding. Empty — will grow as the agent learns."
    performance:
      file: mind/knowledge/tree/performance.md
      depth: 1
      parent: root
      children: []
      child_count: 0
      domain_confidence: null
      article_count: 0
      growth_state: stable
      summary: "How we're DOING — outcome tracking and accuracy analysis. Empty — will grow as the agent tests hypotheses."
    system:
      file: mind/knowledge/tree/system.md
